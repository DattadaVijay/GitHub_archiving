name: Move Changes to Pending

on:
  push:
    branches: [ main ]
    paths: [ 'config.yml' ]

jobs:
  stage-to-pending:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Move New Data to Pending and Revert Main
        run: |
          # Configure identity so the commit works
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          mkdir -p pending/
          
          # 1. Capture the NEW version you just pushed
          # We use a temp file instead of a variable to handle multi-line YAML safely
          cp config.yml "pending/change_$TIMESTAMP.yml"
          
          # 2. Restore the OLD version of config.yml from the previous commit
          # 'git checkout' is cleaner than 'git show' for reverting a single file
          git checkout HEAD~1 -- config.yml
          
          echo "Main file reverted. New version moved to pending."

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "System: Moved new config to pending and restored main"
          # '.' tells it to look at all changes (the revert + the new file)
          file_pattern: '.' 
          # This force-pushes if necessary to clear that "rejected" error you saw
          push_options: '--force'